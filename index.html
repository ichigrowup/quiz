<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>覺察力測驗</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif; background: #F7F3EE; color: #2C2118; }
:root {
  --cream: #F7F3EE; --warm-white: #FDF9F5; --brown-light: #E8DDD2;
  --brown-mid: #C4A882; --brown-dark: #8B6347; --brown-deep: #5C3D22;
  --accent: #A67C52; --text-main: #2C2118; --text-sub: #7A6553;
  --text-muted: #B09880; --border: #DDD0C2;
}
.wrap { max-width: 640px; margin: 0 auto; padding: 2rem 1.25rem; position: relative; overflow: hidden; }
.content { position: relative; z-index: 1; }
.leaf-deco { position: absolute; opacity: 0.15; pointer-events: none; z-index: 0; }
.progress-bg { height: 3px; background: var(--brown-light); border-radius: 2px; margin-bottom: 2rem; }
.progress-fill { height: 3px; background: var(--brown-dark); border-radius: 2px; transition: width 0.4s ease; }
.q-meta { font-size: 12px; color: var(--text-muted); letter-spacing: 0.06em; margin-bottom: 0.5rem; }
.q-tag { display: inline-block; font-size: 11px; padding: 2px 10px; border-radius: 20px; margin-bottom: 0.85rem; font-weight: 500; }
.tag-0 { background: #EDE3D8; color: #5C3D22; }
.tag-1 { background: #E8E3F0; color: #3D2B6B; }
.tag-2 { background: #F0EAD8; color: #5C4A1A; }
.tag-3 { background: #DDE8D8; color: #2E4A28; }
.tag-4 { background: #F0D8D8; color: #6B2828; }
.tag-5 { background: #D8E8E8; color: #1A4A4A; }
.q-text { font-size: 17px; font-weight: 400; color: var(--text-main); line-height: 1.8; margin-bottom: 1.75rem; }
.freq-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.freq-btn { padding: 0.85rem 0.5rem; background: var(--warm-white); border: 1px solid var(--border); border-radius: 12px; font-size: 14px; color: var(--text-sub); cursor: pointer; transition: all 0.2s; text-align: center; line-height: 1.4; }
.freq-btn:hover { background: #EDE3D8; border-color: var(--brown-mid); }
.freq-btn.sel { background: #EDE3D8; border: 2px solid var(--brown-dark); color: var(--brown-deep); font-weight: 500; }
.nav { display: flex; justify-content: space-between; align-items: center; margin-top: 1.75rem; }
.btn-back { padding: 0.65rem 1rem; background: transparent; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text-muted); cursor: pointer; }
.block { background: var(--warm-white); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.1rem; margin-bottom: 0.75rem; }
.block-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em; margin-bottom: 0.4rem; text-transform: uppercase; }
.block-text { font-size: 14px; color: var(--text-sub); line-height: 1.7; }
.divider { height: 1px; background: var(--brown-light); margin: 1.25rem 0; }
.cta-area { margin-top:1.25rem; background: var(--warm-white); border: 1.5px solid var(--brown-mid); border-radius: 12px; padding: 1.25rem; position: relative; overflow: hidden; }
.cta-label { font-size:11px; color: var(--accent); letter-spacing:0.1em; font-weight:500; margin-bottom:0.5rem; }
.cta-title { font-size:16px; font-weight:500; color: var(--text-main); margin-bottom:0.5rem; }
.cta-desc { font-size:14px; color: var(--text-sub); line-height:1.75; margin-bottom:1rem; }
.cta-btn { display:block; padding:0.75rem 1.5rem; background: var(--brown-dark); color:#FDF9F5; border:none; border-radius:8px; font-size:15px; font-weight:500; cursor:pointer; text-align:center; width:100%; }
.dim-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.25rem; }
.dim-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem; }
.dim-name { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
.dim-label { font-size: 13px; font-weight: 500; margin-bottom: 5px; }
.dim-bar-bg { height: 4px; background: var(--brown-light); border-radius: 2px; }
.dim-bar-fill { height: 4px; border-radius: 2px; }
.plant-icon { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── SVG decorations ──
function leafSvg(w,h,v){

  if(n===1) return `<svg width="${w}" height="${h}" viewBox="0 0 80 60" fill="none"><path d="M5 30 C20 5 60 5 75 30 C60 55 20 55 5 30Z" stroke="${s}" stroke-width="1.2" fill="none"/><line x1="5" y1="30" x2="75" y2="30" stroke="${s}" stroke-width="0.8"/><line x1="25" y1="30" x2="18" y2="16" stroke="${s}" stroke-width="0.6"/><line x1="45" y1="30" x2="38" y2="14" stroke="${s}" stroke-width="0.6"/></svg>`;
  if(n===2) return `<svg width="${w}" height="${h}" viewBox="0 0 50 90" fill="none"><path d="M25 85 C5 60 8 20 25 5 C42 20 45 60 25 85Z" stroke="${s}" stroke-width="1.2" fill="none"/><path d="M25 85 C25 60 25 20 25 5" stroke="${s}" stroke-width="0.8"/><path d="M25 60 Q14 48 10 38" stroke="${s}" stroke-width="0.6" fill="none"/><path d="M25 60 Q36 48 40 38" stroke="${s}" stroke-width="0.6" fill="none"/></svg>`;
  return `<svg width="${w}" height="${h}" viewBox="0 0 70 70" fill="none"><path d="M35 65 C10 50 5 20 35 5 C65 20 60 50 35 65Z" stroke="${s}" stroke-width="1.2" fill="none"/><line x1="35" y1="65" x2="35" y2="5" stroke="${s}" stroke-width="0.8"/><line x1="35" y1="48" x2="22" y2="35" stroke="${s}" stroke-width="0.6"/><line x1="35" y1="48" x2="48" y2="35" stroke="${s}" stroke-width="0.6"/></svg>`;
}
function clusterSvg(){const s="#8B6347";return `<svg width="90" height="110" viewBox="0 0 90 110" fill="none"><path d="M45 105 C45 80 38 55 45 10" stroke="${s}" stroke-width="1.1" fill="none"/><path d="M45 30 C30 15 12 18 10 30 C8 42 25 45 45 30Z" stroke="${s}" stroke-width="1" fill="none"/><line x1="10" y1="30" x2="45" y2="30" stroke="${s}" stroke-width="0.6"/><path d="M45 50 C60 35 78 38 80 50 C82 62 65 65 45 50Z" stroke="${s}" stroke-width="1" fill="none"/><line x1="80" y1="50" x2="45" y2="50" stroke="${s}" stroke-width="0.6"/><path d="M45 72 C28 58 10 62 8 74 C6 86 24 88 45 72Z" stroke="${s}" stroke-width="1" fill="none"/></svg>`;}
function fernSvg(){const s="#8B6347";return `<svg width="70" height="100" viewBox="0 0 70 100" fill="none"><path d="M35 98 C35 70 35 30 35 2" stroke="${s}" stroke-width="1" fill="none"/><path d="M35 80 C22 68 8 70 6 80 C4 90 20 92 35 80Z" stroke="${s}" stroke-width="0.9" fill="none"/><path d="M35 62 C48 50 62 52 64 62 C66 72 50 74 35 62Z" stroke="${s}" stroke-width="0.9" fill="none"/><path d="M35 44 C20 32 8 35 6 44 C4 53 22 55 35 44Z" stroke="${s}" stroke-width="0.9" fill="none"/><path d="M35 26 C48 15 60 18 62 26 C64 34 50 36 35 26Z" stroke="${s}" stroke-width="0.9" fill="none"/></svg>`;}
function decoLeaves(v){
  const n=v%3;
  if(n===0) return `<div class="leaf-deco" style="top:-8px;right:-6px;transform:rotate(18deg)">${leafSvg(55,90,v)}</div><div class="leaf-deco" style="bottom:5px;left:-10px;transform:rotate(-28deg) scaleX(-1)">${clusterSvg()}</div>`;
  if(n===1) return `<div class="leaf-deco" style="top:-5px;right:-8px;transform:rotate(12deg)">${fernSvg()}</div><div class="leaf-deco" style="bottom:0px;left:-12px;transform:rotate(-15deg) scaleX(-1)">${leafSvg(50,85,v+1)}</div>`;
  return `<div class="leaf-deco" style="top:-10px;right:-5px;transform:rotate(22deg)">${clusterSvg()}</div><div class="leaf-deco" style="bottom:8px;left:-8px;transform:rotate(-25deg) scaleX(-1)">${fernSvg()}</div>`;
}

// ── plant icons ──
const PLANTS = [
  `<svg width="44" height="44" viewBox="0 0 44 44" fill="none"><ellipse cx="22" cy="27" rx="10" ry="12" stroke="#8B6347" stroke-width="1.2" fill="none"/><path d="M22 15 C22 15 16 9 12 11 C8 13 10 19 14 19 C18 19 22 15 22 15Z" stroke="#8B6347" stroke-width="1" fill="none"/><path d="M22 15 C22 15 28 9 32 11 C36 13 34 19 30 19 C26 19 22 15 22 15Z" stroke="#8B6347" stroke-width="1" fill="none"/><line x1="22" y1="38" x2="22" y2="42" stroke="#8B6347" stroke-width="1"/></svg>`,
  `<svg width="44" height="44" viewBox="0 0 44 44" fill="none"><line x1="22" y1="42" x2="22" y2="18" stroke="#8B6347" stroke-width="1.2"/><path d="M22 30 C22 30 12 26 10 18 C8 10 16 8 20 14 C22 17 22 22 22 30Z" stroke="#8B6347" stroke-width="1" fill="none"/><path d="M22 24 C22 24 32 20 34 12 C36 4 28 2 24 8 C22 11 22 17 22 24Z" stroke="#8B6347" stroke-width="1" fill="none"/></svg>`,
  `<svg width="44" height="44" viewBox="0 0 44 44" fill="none"><line x1="22" y1="42" x2="22" y2="24" stroke="#8B6347" stroke-width="1.4"/><path d="M22 26 C14 26 8 20 8 13 C8 6 14 2 22 2 C30 2 36 6 36 13 C36 20 30 26 22 26Z" stroke="#8B6347" stroke-width="1.1" fill="none"/><line x1="22" y1="20" x2="16" y2="15" stroke="#8B6347" stroke-width="0.7"/><line x1="22" y1="20" x2="28" y2="15" stroke="#8B6347" stroke-width="0.7"/></svg>`,
  `<svg width="44" height="44" viewBox="0 0 44 44" fill="none"><line x1="22" y1="42" x2="22" y2="28" stroke="#8B6347" stroke-width="1.4"/><path d="M22 28 C14 28 8 22 8 15 C8 8 14 4 22 4 C30 4 36 8 36 15 C36 22 30 28 22 28Z" stroke="#8B6347" stroke-width="1.1" fill="none"/><circle cx="22" cy="7" r="3" stroke="#8B6347" stroke-width="1" fill="none"/><path d="M17 5 C15 2 11 3 11 6" stroke="#8B6347" stroke-width="0.9" fill="none"/><path d="M27 5 C29 2 33 3 33 6" stroke="#8B6347" stroke-width="0.9" fill="none"/><path d="M14 10 C11 9 9 12 11 14" stroke="#8B6347" stroke-width="0.9" fill="none"/><path d="M30 10 C33 9 35 12 33 14" stroke="#8B6347" stroke-width="0.9" fill="none"/></svg>`
];

// ── constants ──
const FREQ = [{label:"幾乎不會",s:1},{label:"偶爾如此",s:2},{label:"滿常這樣",s:3},{label:"很自然地會",s:4}];
const FREQ_LABELS = ["幾乎不會","偶爾如此","滿常這樣","很自然地會"];
const PER_DIM = 4; // 每次抽幾題
const TOTAL_Q = 24; // 總題數

const DIMS = [
  {key:"感知力", tag:"tag-0", color:"#8B6347", desc:"讀懂自己的情緒狀態"},
  {key:"信任力", tag:"tag-1", color:"#7B6BAF", desc:"在失敗時仍相信自己"},
  {key:"定向力", tag:"tag-2", color:"#A08030", desc:"知道自己為何而做"},

  {key:"連結力", tag:"tag-5", color:"#3A7A7A", desc:"感知關係的動態與消耗"},

// ── 題庫：每向度 6 題，每次隨機抽 4 題 ──
const BANK = [

  // dim 2 定向力（6題）

    "回顧最近的選擇，我能感覺出哪些是真的想要，哪些是覺得不得不。",

    "當我不想做某件事，我能直接說「我不想」，而不是找藉口或勉強答應。" ],
  // dim 5 連結力（6題）
  [ "我能感覺到某段關係或某個互動讓我消耗，而不是等到很累了才發現。",
    "和別人對話時，我能感覺到對方話語背後想被看見的是什麼。",

// ── 結果類型 ──
const RES = [

    desc:"你有穩定的自我觀察能力，能與自己的情緒同在，也能在複雜的人際或內在狀態中保持清醒。覺察對你來說不是努力出來的，而是一種活著的方式。",

// ── 隨機抽題 ──
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function buildQuiz(){
  // 每個向度從題庫隨機抽 PER_DIM 題，交錯排列避免同向度題目連續
  const picked = BANK.map((pool,dim)=>
    shuffle(pool).slice(0,PER_DIM).map(text=>({dim,text}))
  );
  // 交錯排列：先各取第1題，再各取第2題...
  const result=[];
  for(let i=0;i<PER_DIM;i++){
    for(let d=0;d<DIMS.length;d++){
      result.push(picked[d][i]);
    }
  }
  return result;
}

// ── 計算 ──
function dimScores(Q,ans){
  const s=[0,0,0,0,0,0];
  Q.forEach((q,i)=>{
    if(ans[i]!==null && ans[i]>=0 && ans[i]<=3){
      s[q.dim]+=FREQ[ans[i]].s;
    }
  });
  return s;
}
function totalScore(scores){ return scores.reduce((a,b)=>a+b,0); }
function getRes(tot){
  const found=RES.find(r=>tot>=r.range[0]&&tot<=r.range[1]);
  if(found) return found;
  return tot<RES[0].range[0] ? RES[0] : RES[RES.length-1];
}
function getMinIdx(scores){
  let min=Infinity,idx=0;
  scores.forEach((s,i)=>{ if(s<min){min=s;idx=i;} });
  return idx;
}
function getMaxIdx(scores){
  let max=-Infinity,idx=0;
  scores.forEach((s,i)=>{ if(s>max){max=s;idx=i;} });
  return idx;
}
// 每向度平均分轉換為1-4的雷達值
function toRadarVals(scores){
  return scores.map(s=>{
    const avg=s/PER_DIM;
    return Math.max(1,Math.min(4,avg));
  });
}
// 向度標籤文字（分數/PER_DIM四捨五入對應FREQ）
function freqLabel(score){
  const avg=score/PER_DIM;
  const idx=Math.max(0,Math.min(3,Math.round(avg)-1));
  return FREQ_LABELS[idx];
}

// ── 雷達圖 ──
function drawRadar(radarVals, canvasId){
  const canvas=document.getElementById(canvasId);
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const cx=130,cy=130,r=95,n=6;
  ctx.clearRect(0,0,260,260);
  for(let lv=1;lv<=4;lv++){
    ctx.beginPath();
    for(let i=0;i<n;i++){
      const a=(Math.PI*2/n)*i-Math.PI/2;
      const pr=(r/4)*lv;
      i===0?ctx.moveTo(cx+pr*Math.cos(a),cy+pr*Math.sin(a)):ctx.lineTo(cx+pr*Math.cos(a),cy+pr*Math.sin(a));
    }
    ctx.closePath();
    ctx.strokeStyle=lv===4?"#DDD0C2":"#EDE3D8";
    ctx.lineWidth=lv===4?1.2:0.6;
    ctx.stroke();
  }
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i-Math.PI/2;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    ctx.strokeStyle="#EDE3D8";ctx.lineWidth=0.6;ctx.stroke();
  }
  ctx.beginPath();
  radarVals.forEach((v,i)=>{
    const a=(Math.PI*2/n)*i-Math.PI/2;
    const pr=(r/4)*v;
    i===0?ctx.moveTo(cx+pr*Math.cos(a),cy+pr*Math.sin(a)):ctx.lineTo(cx+pr*Math.cos(a),cy+pr*Math.sin(a));
  });
  ctx.closePath();
  ctx.fillStyle="rgba(139,99,71,0.13)";ctx.fill();
  ctx.strokeStyle="#8B6347";ctx.lineWidth=1.5;ctx.stroke();
  radarVals.forEach((v,i)=>{
    const a=(Math.PI*2/n)*i-Math.PI/2;
    const pr=(r/4)*v;
    ctx.beginPath();ctx.arc(cx+pr*Math.cos(a),cy+pr*Math.sin(a),4,0,Math.PI*2);
    ctx.fillStyle="#8B6347";ctx.fill();
  });
  ctx.font="11px -apple-system,'Noto Sans TC',sans-serif";
  ctx.fillStyle="#7A6553";ctx.textAlign="center";
  DIMS.forEach((d,i)=>{
    const a=(Math.PI*2/n)*i-Math.PI/2;
    ctx.fillText(d.key,cx+(r+22)*Math.cos(a),cy+(r+22)*Math.sin(a)+4);
  });
}

function pick(i){
  if(i<0||i>3) return; // 防呆
  ans.push(i);
  if(ans.length>=TOTAL_Q){ phase="result"; render(); }
  else { setTimeout(()=>render(),380); render(); }
}
function goBack(){
  if(ans.length>0){ ans.pop(); render(); }
}
function startQuiz(){ Q=buildQuiz(); ans=[]; phase="quiz"; render(); }
function restart(){ Q=[]; ans=[]; phase="intro"; render(); }
function bookCall(){ window.open("https://forms.gle/16WM4BDYXKunSdyq9","_blank"); }
render();
</script>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>覺察力測驗</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif; background: #faf9f7; color: #1a1a1a; }
.wrap { max-width: 640px; margin: 0 auto; padding: 2rem 1.25rem; }
.progress-bg { height: 4px; background: #e5e3df; border-radius: 2px; margin-bottom: 2rem; }
.progress-fill { height: 4px; background: #7F77DD; border-radius: 2px; transition: width 0.4s ease; }
.q-meta { font-size: 12px; color: #999; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
.q-tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-bottom: 0.75rem; font-weight: 500; }
.tag-self { background: #EEEDFE; color: #534AB7; }
.tag-rel { background: #E1F5EE; color: #0F6E56; }
.q-context { font-size: 14px; color: #555; margin-bottom: 1.1rem; line-height: 1.65; background: #f3f2fe; border-radius: 8px; padding: 0.75rem 1rem; border-left: 3px solid #AFA9EC; }
.q-text { font-size: 17px; font-weight: 500; color: #1a1a1a; line-height: 1.6; margin-bottom: 1.25rem; }
.opt { display: block; width: 100%; text-align: left; padding: 0.85rem 1.1rem; margin-bottom: 0.6rem; background: #fff; border: 1px solid #ddd; border-radius: 12px; font-size: 15px; color: #1a1a1a; cursor: pointer; transition: all 0.15s; line-height: 1.5; }
.opt:hover { background: #f5f4fe; border-color: #AFA9EC; }
.opt.sel { background: #EEEDFE; border: 2px solid #7F77DD; color: #3C3489; }
.opt-tag { font-size: 12px; color: #bbb; margin-right: 8px; }
.nav { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
.btn-next { padding: 0.65rem 1.5rem; background: #7F77DD; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 500; }
.btn-next:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-back { padding: 0.65rem 1rem; background: transparent; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; color: #888; cursor: pointer; }
.dim-bar-bg { height: 5px; background: #e5e3df; border-radius: 3px; margin-top: 5px; }
.dim-bar-fill { height: 5px; border-radius: 3px; }
.block { background: #f5f4f0; border-radius: 12px; padding: 1rem 1.1rem; margin-bottom: 0.75rem; }
.block-label { font-size: 11px; color: #aaa; letter-spacing: 0.06em; margin-bottom: 0.4rem; text-transform: uppercase; }
.block-text { font-size: 14px; color: #444; line-height: 1.65; }
.divider { height: 1px; background: #ece9e3; margin: 1.25rem 0; }
.mail-card { border: 2px solid #7F77DD; border-radius: 12px; padding: 1.25rem; margin-top: 1.5rem; }
.mail-title { font-size: 16px; font-weight: 500; margin-bottom: 0.4rem; }
.mail-desc { font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 1rem; }
.mail-row { display: flex; gap: 8px; flex-wrap: wrap; }
.mail-input { flex: 1; min-width: 200px; padding: 0.65rem 0.9rem; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
.mail-input:focus { outline: none; border-color: #7F77DD; }
.mail-btn { padding: 0.65rem 1.25rem; background: #7F77DD; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
.sent { font-size: 14px; color: #0F6E56; background: #E1F5EE; border-radius: 8px; padding: 0.65rem 1rem; text-align: center; }
.cta-btn { display: block; padding: 0.75rem 1.5rem; background: transparent; color: #534AB7; border: 2px solid #7F77DD; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; text-align: center; width: 100%; margin-top: 0.75rem; }
.score-circle { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 500; flex-shrink: 0; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const Q = [
  { cat:"自我", ctx:"你今天跟主管開會，對方否定了你花了一週準備的提案，只說「這方向不對」，沒有多做解釋。", q:"你第一個浮現的反應是什麼？", opts:[{t:"心裡一沉，但壓下來，繼續開會",s:1},{t:"開始回想自己是不是哪裡做錯了",s:2},{t:"注意到自己很委屈，但不確定該怎麼辦",s:3},{t:"感受到挫折，同時想了解對方的考量是什麼",s:4}] },
  { cat:"人際", ctx:"好友突然取消了你們計劃已久的聚會，理由聽起來有點敷衍。", q:"你接下來幾個小時的心理狀態是？", opts:[{t:"沒什麼感覺，繼續做自己的事",s:1},{t:"有點悶，但說不清楚是什麼情緒",s:2},{t:"感覺到失落，但會自我安慰「沒關係」",s:3},{t:"能辨識是失落，也允許自己有這個感受",s:4}] },
  { cat:"自我", ctx:"你在某個場合說了一個意見，旁邊的人沒什麼反應，現場有點安靜。", q:"你腦中最快冒出的聲音是什麼？", opts:[{t:"「我說錯了嗎？」開始反覆回想",s:1},{t:"假裝沒事，心裡卻有點不安",s:2},{t:"注意到自己有點在意，但能繼續對話",s:3},{t:"好奇為什麼沉默，不急著填補空白",s:4}] },
  { cat:"人際", ctx:"你答應幫一個朋友的忙，但事後發現佔用了你很多時間和精力，讓你有點後悔答應。", q:"你通常怎麼處理這種感受？", opts:[{t:"告訴自己「幫朋友是應該的」，壓下去",s:1},{t:"有些煩躁，但覺得說出來也沒用",s:2},{t:"意識到自己的邊界被越過了，但不確定如何表達",s:3},{t:"承認這次沒照顧到自己，想想下次怎麼回應才對",s:4}] },
  { cat:"自我", ctx:"半夜你突然睡不著，腦中有很多念頭轉個不停。", q:"你對這個狀態的反應是什麼？", opts:[{t:"滑手機轉移注意力，直到睡著",s:1},{t:"知道自己在亂想，但停不下來",s:2},{t:"試著觀察那些念頭，但有時還是會被捲進去",s:3},{t:"能陪自己待在這個狀態裡，好奇這些念頭在說什麼",s:4}] },
  { cat:"自我", ctx:"你正在做一個決定，但兩個選項都有優缺點，遲遲無法決定。", q:"你最常用什麼方式處理這種卡住的感覺？", opts:[{t:"請別人幫我決定，或等到最後期限才行動",s:1},{t:"反覆想利弊，越想越焦慮",s:2},{t:"意識到卡住是因為害怕某個結果，但還不確定是什麼",s:3},{t:"探索自己真正在意的是什麼，從那裡做決定",s:4}] },
  { cat:"自我", ctx:"有人對你說了一句話，讓你突然心情很差，但你自己也搞不清楚為什麼。", q:"你通常怎麼對待這個「搞不清楚為什麼」的狀態？", opts:[{t:"算了，過一陣子就好了",s:1},{t:"覺得自己太敏感，有點責怪自己",s:2},{t:"想要理解，但不知道從哪裡入手",s:3},{t:"把它當線索，好奇這個反應背後藏著什麼",s:4}] },
  { cat:"人際", ctx:"你在某段關係中一直付出很多，但漸漸感覺不太對，又說不清楚哪裡不對。", q:"面對這種模糊的感受，你的應對方式是？", opts:[{t:"繼續撐著，也許是我想太多",s:1},{t:"有時爆發情緒，事後又後悔",s:2},{t:"知道有些東西需要改變，但不確定是什麼",s:3},{t:"願意停下來，好好聽自己說什麼",s:4}] },
  { cat:"自我", ctx:"你達成了一個重要目標，身邊的人都在恭喜你，但你自己感覺卻很空。", q:"對於這種「應該開心卻開心不起來」的感覺，你怎麼看？", opts:[{t:"覺得自己有問題，強迫自己表現開心",s:1},{t:"忽略這個感受，繼續設定下一個目標",s:2},{t:"注意到了，但不確定這代表什麼",s:3},{t:"把它當訊號，想了解自己真正渴望的是什麼",s:4}] },
  { cat:"自我", ctx:"你即將要嘗試一件對你來說全新的事，心裡有些緊張。", q:"你和自己的「緊張感」的關係通常是？", opts:[{t:"覺得緊張是弱點，想辦法壓下去",s:1},{t:"被緊張帶著走，容易退縮或拖延",s:2},{t:"能感覺到緊張，但不確定怎麼和它相處",s:3},{t:"把緊張當陪伴，帶著它一起向前",s:4}] },
  { cat:"人際", ctx:"和某個家人或伴侶發生爭執後，你們各自冷靜了一段時間，現在需要重新開口。", q:"你通常怎麼面對「重新開口」這件事？", opts:[{t:"等對方先說，或者假裝沒發生過",s:1},{t:"想道歉，但怕說錯又起衝突，所以拖著",s:2},{t:"知道自己有一部分需要負責，但心裡還有些委屈未消化",s:3},{t:"能先整理自己的感受，再帶著真誠的心去對話",s:4}] },
  { cat:"人際", ctx:"你發現自己在某段友誼或工作關係中，一直是那個主動聯繫、配合對方的人。", q:"你對這個模式的覺察是？", opts:[{t:"沒有特別想過，這好像就是我的習慣",s:1},{t:"偶爾覺得累，但覺得這樣才能維持關係",s:2},{t:"意識到這個模式，但不知道怎麼改變又不傷感情",s:3},{t:"能看見這個模式背後的需求，並在適當時候重新設定關係",s:4}] },
  { cat:"人際", ctx:"有個人跟你說他很需要你，讓你感到一種說不清楚的壓力。", q:"你的內在反應通常是？", opts:[{t:"立刻答應，事後才感覺到壓力",s:1},{t:"感覺到壓力，但不好意思拒絕",s:2},{t:"注意到自己的不舒服，但還是難以清楚表達界線",s:3},{t:"能辨識自己的狀態，溫和但清楚地回應對方",s:4}] },
  { cat:"自我", ctx:"你做了一個決定，事後發現結果不如預期，身邊有人說「早就說了嘛」。", q:"你內心的第一個聲音是什麼？", opts:[{t:"「我真的很爛」——開始嚴厲批判自己",s:1},{t:"感到羞愧，想找藉口解釋",s:2},{t:"有些防衛，但也感覺到自責",s:3},{t:"承認判斷有誤，好奇下次可以怎麼做得不一樣",s:4}] },
  { cat:"人際", ctx:"你和某個你在意的人，在一件事情上有截然不同的看法，對話開始變得緊張。", q:"你在這種張力裡的狀態通常是？", opts:[{t:"立刻退讓，說「你說的對」，但心裡不服",s:1},{t:"說了不少，但事後覺得自己沒說到重點",s:2},{t:"能表達自己的立場，但情緒偶爾會主導語氣",s:3},{t:"能在堅持自己的同時，也真正聽見對方的視角",s:4}] },
];

const RES = [
  { range:[15,27], type:"覺察萌芽期", emoji:"🌱", bg:"#EEEDFE", col:"#3C3489", selfNote:"自我向度：情緒大多在意識之外自動運作，習慣以壓抑或迴避應對。", relNote:"人際向度：傾向迴避衝突，難以辨識自己在關係中的需求與邊界。", desc:"你的覺察之旅正要開始。目前大多數時候，情緒和反應是自動運作的——它們在你還沒意識到之前就已經發生了。這並不是缺點，而是所有人覺察旅程的起點。", blk:"習慣壓抑情緒，覺得「有感覺」是軟弱的表現。在衝突或不舒服時，第一個反應是迴避或合理化。", inv:"如果你開始感覺「好像有什麼東西卡著」，卻不知道從哪裡入手，這正是很好的開始。我們可以一起探索。" },
  { range:[28,38], type:"覺察探索期", emoji:"🌿", bg:"#E1F5EE", col:"#085041", selfNote:"自我向度：能感知情緒，但常在「感覺到了」和「知道怎麼辦」之間卡住。", relNote:"人際向度：察覺關係中的不舒服，但難以清楚表達或調整互動模式。", desc:"你已經開始感覺到自己的內在狀態，偶爾會注意到情緒或身體反應，但常常在感知到了之後卻不知道如何深入。你知道有什麼需要被看見，只是還不太確定怎麼靠近。", blk:"能感覺到情緒，但容易自我批判（「我怎麼這麼敏感」），或不知道感受到之後可以做什麼。覺察到了卻轉化不了行動。", inv:"你已經有感知的能力了，現在需要的是一個安全的空間，讓你練習深入下去。我們可以從你最熟悉的日常情境開始。" },
  { range:[39,50], type:"覺察成長期", emoji:"🌳", bg:"#E6F1FB", col:"#0C447C", selfNote:"自我向度：有相當的觀察能力，能辨識情緒與需求，但在觸發點前仍有習慣性反應。", relNote:"人際向度：能覺察關係動態，但在高張力對話中，情緒有時仍會主導。", desc:"你有相當的自我觀察能力，能在很多時候注意到自己的情緒、模式和需求。但在某些觸發點或長期慣性面前，你可能還是會卡住、繞回去，甚至懷疑自己的感受。", blk:"在「知道」和「真正改變」之間還有一段路。有時候理解了一件事，情緒還是按照舊有模式反應。", inv:"你已經走了很長一段路。下一步通常不是「更努力了解自己」，而是讓覺察更柔軟、更有彈性。如果你想聊聊那個還沒被鬆動的地方，我在。" },
  { range:[51,60], type:"覺察整合期", emoji:"✦", bg:"#FAEEDA", col:"#633806", selfNote:"自我向度：能與情緒同在，辨識慣性模式，在壓力下仍能回到自己。", relNote:"人際向度：能在關係中保持清醒，設立健康邊界，也能真正聽見對方。", desc:"你有穩定的自我觀察能力，能與自己的情緒同在，也能在複雜的人際或內在狀態中保持清醒。你對自己的慣性模式有相當程度的認識，並且在持續深化中。", blk:"在整合期，卡關往往更細微——是關係深度、價值實踐，或在壓力下是否還能回到自己。覺察不是終點，而是一種持續活著的方式。", inv:"走到這裡很不容易。如果你想要有人陪你走得更深、更遠，我很樂意成為那個陪伴者。" }
];

let cur = 0, ans = new Array(Q.length).fill(null), phase = "intro", sentEmail = "";

const selfQs = Q.filter(q => q.cat === "自我");
const relQs = Q.filter(q => q.cat === "人際");
const maxSelf = selfQs.length * 4;
const maxRel = relQs.length * 4;

function totalScore() { return ans.reduce((s,a,i) => a !== null ? s + Q[i].opts[a].s : s, 0); }
function selfScore() { return Q.reduce((s,q,i) => q.cat === "自我" && ans[i] !== null ? s + q.opts[ans[i]].s : s, 0); }
function relScore() { return Q.reduce((s,q,i) => q.cat === "人際" && ans[i] !== null ? s + q.opts[ans[i]].s : s, 0); }
function getRes(tot) { return RES.find(r => tot >= r.range[0] && tot <= r.range[1]); }

function render() {
  const app = document.getElementById("app");
  if (phase === "intro") {
    app.innerHTML = `<div class="wrap">
      <p style="font-size:12px;color:#aaa;margin-bottom:1rem;letter-spacing:0.05em">覺察力測驗</p>
      <h1 style="font-size:24px;font-weight:500;line-height:1.4;margin-bottom:0.75rem">你有多了解自己？<br>日常覺察力自我測驗</h1>
      <p style="font-size:15px;color:#555;line-height:1.8;margin-bottom:1.75rem">15道日常情境題，從<strong style="font-weight:500;color:#534AB7">自我覺察</strong>與<strong style="font-weight:500;color:#0F6E56">人際關係</strong>兩個向度，幫助你了解目前的內在狀態——你習慣如何回應情緒、如何面對關係，以及可能在哪裡卡關。<br><br>沒有對錯，選最真實的那個答案。</p>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:2rem">
        <span style="padding:0.3rem 0.75rem;background:#EEEDFE;color:#3C3489;border-radius:20px;font-size:13px">15 道情境題</span>
        <span style="padding:0.3rem 0.75rem;background:#EEEDFE;color:#3C3489;border-radius:20px;font-size:13px">約 5 分鐘</span>
        <span style="padding:0.3rem 0.75rem;background:#EEEDFE;color:#3C3489;border-radius:20px;font-size:13px">自我 + 人際兩向度</span>
        <span style="padding:0.3rem 0.75rem;background:#EEEDFE;color:#3C3489;border-radius:20px;font-size:13px">個人化報告書</span>
      </div>
      <button onclick="startQuiz()" style="padding:0.8rem 2rem;background:#7F77DD;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer">開始測驗</button>
    </div>`;
  } else if (phase === "quiz") {
    const q = Q[cur];
    const pct = (cur / Q.length) * 100;
    app.innerHTML = `<div class="wrap">
      <div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="q-meta">第 ${cur+1} 題 / 共 ${Q.length} 題</div>
      <span class="q-tag ${q.cat==='人際'?'tag-rel':'tag-self'}">${q.cat==='人際'?'人際關係':'自我覺察'}</span>
      <div class="q-context">${q.ctx}</div>
      <div class="q-text">${q.q}</div>
      ${q.opts.map((o,i)=>`<button class="opt ${ans[cur]===i?'sel':''}" onclick="pick(${i})"><span class="opt-tag">${String.fromCharCode(65+i)}.</span>${o.t}</button>`).join("")}
      <div class="nav">
        <button class="btn-back" onclick="goBack()" ${cur===0?'style="visibility:hidden"':""}>上一題</button>
        <span style="font-size:13px;color:#aaa">${ans.filter(a=>a!==null).length} / ${Q.length}</span>
        <button class="btn-next" onclick="goNext()" ${ans[cur]===null?'disabled':""}>${cur===Q.length-1?'查看結果':'下一題'}</button>
      </div>
    </div>`;
  } else if (phase === "result") {
    const tot = totalScore(), ss = selfScore(), rs = relScore();
    const r = getRes(tot);
    const spct = Math.round(ss/maxSelf*100), rpct = Math.round(rs/maxRel*100);
    const tpct = Math.round((tot-15)/45*100);
    const mailHtml = sentEmail
      ? `<div class="sent">報告書已寄出至 ${sentEmail}，請記得查收（含垃圾信件匣）</div>`
      : `<div class="mail-title">領取你的個人覺察報告書</div>
         <div class="mail-desc">輸入 email，我將寄送對應你類型的完整報告書，包含深度解析與日常練習建議。</div>
         <div class="mail-row">
           <input class="mail-input" id="ei" type="email" placeholder="your@email.com" />
           <button class="mail-btn" onclick="submitMail('${r.type}',${tot},${ss},${rs})">寄送報告書</button>
         </div>
         <div id="merr" style="font-size:13px;color:#c00;margin-top:6px;display:none">請輸入有效的 email 地址</div>`;
    app.innerHTML = `<div class="wrap">

function submitMail(type, tot, ss, rs) {
  const v = document.getElementById("ei").value.trim();
  const err = document.getElementById("merr");
  if (!v || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) { err.style.display="block"; return; }
  err.style.display = "none";
  sentEmail = v;
  render();
}

function startQuiz() { phase="quiz"; render(); }
function pick(i) { ans[cur]=i; render(); }
function goNext() { cur < Q.length-1 ? cur++ : phase="result"; render(); }
function goBack() { if(cur>0){ cur--; render(); } }
function restart() { cur=0; ans=new Array(Q.length).fill(null); phase="intro"; sentEmail=""; render(); }
function bookCall() { window.open("https://forms.gle/16WM4BDYXKunSdyq9", "_blank"); }
render();
